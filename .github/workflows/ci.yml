name: Continuous Integration

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy env vars required for build-time validation
      DATABASE_URL: "postgresql://postgres.wzpttfhkiahplzpyezqu:Mj5qNUHRAaERP3dJ@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres"
      AUTH_SECRET: "dummy-secret-at-least-32-chars-long"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Linting
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build Check
        run: npm run build
